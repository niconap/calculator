<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Calculator</title>
        <meta name="description" content="Calculator">
        <meta name="author" content="SitePoint">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <form class="calculator" name="calc">
            <input id="value" type="text" name="txt" readonly="">
            <span class="num" id="clear" onclick="document.calc.txt.value = ''">c</span>
            <span class="num" id="divide" onclick="document.calc.txt.value = ''">/</span>
            <span class="num" id="multiply" onclick="document.calc.txt.value = ''">*</span>
            <span class="num" id="seven">7</span>
            <span class="num" id="eight">8</span>
            <span class="num" id="nine">9</span>
            <span class="num" id="subtract">-</span>
            <span class="num" id="four">4</span>
            <span class="num" id="five">5</span>
            <span class="num" id="six">6</span>
            <span class="num" id="add">+</span>
            <span class="num" id="three">3</span>
            <span class="num" id="two">2</span>
            <span class="num" id="one">1</span>
            <span class="num" id="zero">0</span>
            <span class="num" id="comma">.</span>
            <span class="num" id="equals">=</span>
            <span id="paragraph">Created by: <a href="https://github.com/niconap/">Nico</a></span>
        </form>
        <script src="scripts.js"></script>
    </body>
</html>
